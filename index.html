<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NoLake Company</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    font-family: "Segoe UI", Arial, sans-serif;
    background: #0f172a;
    color: #fff;
    overflow-x: hidden;
  }

  #stars {
    position: fixed;
    top: 0;
    left: 0;
    z-index: 0;
    width: 100%;
    height: 100%;
  }

  .container {
    position: relative;
    z-index: 1;
    text-align: center;
    padding: 80px 20px;
  }

  h1 {
    font-size: 50px;
    color: #38bdf8;
    margin-bottom: 10px;
    animation: fadeIn 2s ease forwards;
  }

  p.subtitle {
    font-size: 22px;
    color: #a5b4fc;
    margin-bottom: 50px;
    animation: fadeIn 2s 0.5s ease forwards;
  }

  .card {
    display: inline-block;
    background: rgba(30, 41, 59, 0.85);
    margin: 20px;
    padding: 25px 40px;
    border-radius: 15px;
    box-shadow: 0 8px 20px rgba(0, 0, 0, 0.5);
    transition: transform 0.3s, box-shadow 0.3s;
    animation: fadeInUp 1.5s ease forwards;
  }

  .card:hover {
    transform: translateY(-10px);
    box-shadow: 0 14px 30px rgba(56, 189, 248, 0.25);
  }

  .title {
    font-size: 24px;
    margin-bottom: 15px;
    color: #38bdf8;
  }

  .button-wrap {
    margin-top: 18px;
  }

  .blog-button {
    display: inline-block;
    padding: 12px 24px;
    border-radius: 999px;
    background: linear-gradient(135deg, #38bdf8, #818cf8);
    color: #fff;
    text-decoration: none;
    font-size: 16px;
    font-weight: 600;
    box-shadow: 0 10px 24px rgba(56, 189, 248, 0.3);
    transition: transform 0.25s ease, box-shadow 0.25s ease, opacity 0.25s ease;
  }

  .blog-button:hover {
    transform: translateY(-3px) scale(1.02);
    box-shadow: 0 14px 30px rgba(129, 140, 248, 0.35);
    opacity: 0.96;
  }

  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  @keyframes fadeInUp {
    from {
      opacity: 0;
      transform: translateY(50px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  @media (max-width: 600px) {
    .card {
      width: 80%;
      padding: 20px;
    }

    h1 {
      font-size: 36px;
    }

    .blog-button {
      width: 100%;
      box-sizing: border-box;
    }
  }
</style>
</head>
<body>

<canvas id="stars"></canvas>

<div class="container">
  <h1>🚀 NoLake Company</h1>
  <p class="subtitle">Welcome to our official website</p>

  <div class="card">
    <div class="title">👥 成员</div>
    <p>RootSher</p>
    <p>岛山明</p>
  </div>

  <div class="card">
    <div class="title">💰 赞助商</div>
    <p>暂无</p>
  </div>

  <div class="card">
    <div class="title">🤖 AI 赚钱</div>
    <p>查看 NoLake Tech 的 AI 赚钱博客</p>
    <div class="button-wrap">
      <a
        class="blog-button"
        href="https://nolaketech.github.io/ai-money-blog/"
        target="_blank"
        rel="noopener noreferrer"
      >
        前往 AI 赚钱博客
      </a>
    </div>
  </div>
</div>

<script>
const canvas = document.getElementById("stars");
const ctx = canvas.getContext("2d");
let stars = [];

function resizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}

window.addEventListener("resize", resizeCanvas);
resizeCanvas();

for (let i = 0; i < 300; i++) {
  stars.push({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    r: Math.random() * 2 + 0.5,
    d: Math.random() * 0.5 + 0.2
  });
}

function drawStars() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = "white";
  for (const s of stars) {
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fill();
  }
}

function updateStars() {
  for (const s of stars) {
    s.y += s.d;
    if (s.y > canvas.height) {
      s.y = 0;
      s.x = Math.random() * canvas.width;
    }
  }
}

function animate() {
  drawStars();
  updateStars();
  requestAnimationFrame(animate);
}

animate();
</script>

</body>
</html>
